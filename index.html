<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESTINY DRAW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- HEADER BAR -->
        <header>
            <h1 class="glow-yellow">DESTINY DRAW</h1>
            <div id="controls-bar">
                <button id="btn-fullscreen" class="btn-pixel small">FS</button>
                <button id="btn-reset-session" class="btn-pixel small red">RESET</button>
            </div>
        </header>

        <!-- MAIN LAYOUT WRAPPER -->
        <div id="main-layout">
            <!-- LEFT SIDEBAR: SESSION STATUS & ROLES -->
            <aside id="sidebar">
                <div class="panel-blue" id="remaining-roles-panel">
                    <h3>ROLES LEFT</h3>
                    <ul id="roles-list"></ul>
                </div>
                <div class="panel-blue" id="player-history-panel">
                    <h3>HISTORY</h3>
                    <div id="history-list"></div>
                </div>
            </aside>

            <!-- CENTER/RIGHT STAGE: DYNAMIC VIEWS -->
            <main id="stage">
                <!-- VIEW 1: ENTER NAME -->
                <section id="view-input-name" class="view active">
                    <div class="panel-blue central-box">
                        <h2>ENTER YOUR NAME</h2>
                        <input type="text" id="player-name-input" maxlength="15" placeholder="NAME..." autocomplete="off">
                        <button id="btn-start-journey" class="btn-pixel">ENTER VAULT</button>
                    </div>
                </section>

                <!-- VIEW 2: MINI-GAME INTRO / TRANSITION -->
                <section id="view-game-intro" class="view">
                    <div class="panel-blue central-box">
                        <h2 id="intro-game-title">GAME 1/3</h2>
                        <p id="intro-game-desc">PREPARE YOURSELF...</p>
                        <div class="countdown-display" id="intro-countdown">3</div>
                        <button id="btn-skip-intro" class="btn-pixel hidden">START</button>
                    </div>
                </section>

                <!-- VIEW 3: MINI-GAME ARENA -->
                <section id="view-game-arena" class="view">
                    <div class="panel-blue arena-box">
                        <div id="arena-header">
                            <span id="arena-game-name">MINI GAME</span>
                            <span id="arena-timer">TIME: 00</span>
                        </div>
                        <div id="arena-canvas-container">
                            <!-- Mini-games inject their dynamic HTML inside here -->
                        </div>
                        <div id="arena-footer">
                            <div id="arena-score-tracking">SCORE: 0</div>
                        </div>
                    </div>
                </section>

                <!-- VIEW 4: MINI-GAME RESULT -->
                <section id="view-game-result" class="view">
                    <div class="panel-blue central-box">
                        <h2 id="result-status-title" class="glow-yellow">WIN</h2>
                        <p id="result-status-desc">MATCH STATS</p>
                        <button id="btn-continue-journey" class="btn-pixel">CONTINUE</button>
                    </div>
                </section>

                <!-- VIEW 5: DESTINY DETERMINATION (THE VAULT CHOICE / RANDOM ASSIGNMENT) -->
                <section id="view-destiny" class="view">
                    <div class="panel-blue central-box full-width">
                        <h2 id="destiny-title">THE VAULT UNLOCKED</h2>
                        <p id="destiny-subtitle">CHOOSE YOUR ROLE</p>
                        
                        <!-- Choice Grid (Visible if Wins >= 2) -->
                        <div id="role-selection-grid" class="hidden"></div>
                        
                        <!-- Randomizer Machine Container (Visible if Wins < 2) -->
                        <div id="randomizer-machine" class="hidden">
                            <div id="randomizer-roulette">???</div>
                            <button id="btn-trigger-roulette" class="btn-pixel">DRAW DESTINY</button>
                        </div>
                    </div>
                </section>

                <!-- VIEW 6: DESTINY RESOLUTION ANIMATION -->
                <section id="view-resolution" class="view">
                    <div class="panel-blue central-box">
                        <h2 id="resolution-outcome-title">YOUR DESTINY</h2>
                        <div id="resolved-role-card" class="role-card big animated">
                            <div class="card-inner">?</div>
                        </div>
                        <button id="btn-finish-turn" class="btn-pixel">SAVE & NEXT</button>
                    </div>
                </section>

                <!-- VIEW 7: SUMMARY / SESSION OVERVIEW -->
                <section id="view-summary" class="view">
                    <div class="panel-blue central-box full-width">
                        <h2>FINAL CHRONICLES</h2>
                        <table id="summary-table">
                            <thead>
                                <tr>
                                    <th>PLAYER</th>
                                    <th>DESTINY ROLE</th>
                                </tr>
                            </thead>
                            <tbody id="summary-table-body"></tbody>
                        </table>
                        <button id="btn-restart-full" class="btn-pixel red">NEW SESSION</button>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- CANVAS EFFECTS BUFFER -->
    <canvas id="confetti-canvas"></canvas>

    <!-- MAIN ENGINE -->
    <script src="script.js"></script>
</body>
</html>
